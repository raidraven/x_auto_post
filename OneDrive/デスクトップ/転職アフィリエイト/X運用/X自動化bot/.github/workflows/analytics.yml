name: X Weekly Analytics

on:
  # 毎週月曜 朝9:00 JST (UTC 0:00)
  schedule:
    - cron: "0 0 * * 1"

  # 手動実行も可能
  workflow_dispatch:

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install tweepy anthropic python-dotenv

      - name: アナリティクスを取得
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python analytics.py

      - name: CSVをArtifactとして保存
        uses: actions/upload-artifact@v4
        with:
          name: weekly-analytics-${{ github.run_id }}
          path: X投稿データ/analytics_*.csv
          retention-days: 90
